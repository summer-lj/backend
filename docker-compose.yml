services:
  api:
    build:
      context: .
      dockerfile: ./docker/api/Dockerfile
      target: development
    container_name: backend-api-dev
    env_file:
      - .env.local
    environment:
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./:/workspace
      - root-node-modules:/workspace/node_modules
      - api-node-modules:/workspace/apps/api/node_modules
      - pnpm-store:/pnpm/store
    restart: unless-stopped
    command: ['pnpm', '--filter', '@backend/api', 'start:dev']

  postgres:
    image: postgres:16-alpine
    container_name: backend-postgres-dev
    environment:
      POSTGRES_DB: backend_local
      POSTGRES_USER: backend
      POSTGRES_PASSWORD: backend
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U backend -d backend_local']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: backend-redis-dev
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: ['redis-server', '--appendonly', 'yes']
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: backend-mailpit-dev
    ports:
      - '8025:8025'
      - '1025:1025'
    restart: unless-stopped

volumes:
  root-node-modules:
  api-node-modules:
  pnpm-store:
  postgres-data:
  redis-data:
